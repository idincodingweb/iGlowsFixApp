name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build:
    name: Build APK Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Ensure Flutter platform files
        run: flutter create . --project-name iglows --org com.iglows --platforms=android --no-pub

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

      - name: Build release APK (obfuscated + split debug info)
        env:
          GROQ_API_KEY_1: ${{ secrets.GROQ_API_KEY_1 }}
          GROQ_API_KEY_2: ${{ secrets.GROQ_API_KEY_2 }}
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
        run: |
          flutter build apk --release \
            --obfuscate \
            --split-debug-info=build/debug-info \
            --dart-define=GROQ_API_KEY_1=$GROQ_API_KEY_1 \
            --dart-define=GROQ_API_KEY_2=$GROQ_API_KEY_2 \
            --dart-define=RAPIDAPI_KEY=$RAPIDAPI_KEY

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: iglows-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk

      - name: Upload obfuscation debug symbols
        uses: actions/upload-artifact@v4
        with:
          name: iglows-debug-symbols
          path: build/debug-info
