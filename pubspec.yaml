name: iglows
description: iGlows - AI skincare companion app.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter
  cloud_firestore: ^5.4.4
  cupertino_icons: ^1.0.6
  firebase_auth: ^5.3.1
  firebase_core: ^3.6.0
  fl_chart: ^0.69.0
  flutter_local_notifications: ^17.2.3
  google_fonts: ^6.2.1
  http: ^1.2.2
  image_picker: ^1.1.2
  shared_preferences: ^2.3.2
  smooth_page_indicator: ^1.2.0
  timezone: ^0.9.4
  url_launcher: ^6.3.1
  webview_flutter: ^4.10.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
